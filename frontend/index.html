<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <input
            type="text"
            id="urlInput"
            placeholder="Enter URL">

        <br><br>

        <input
            type="text"
            id="aliasInput"
            placeholder="Custom Alias (Optional)">

        <br><br>

        <button id="shortenBtn">
            Shorten URL
        </button>

        <div id="result"></div>

        <a href="analytics.html">
            <button id="analyticsBtn">
                📊 View Analytics
            </button>
        </a>

    </div>

    <script src="app.js"></script>

</body>
</html>
